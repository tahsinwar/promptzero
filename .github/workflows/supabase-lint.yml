name: Supabase DB Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  search-path-check:
    runs-on: ubuntu-latest
    name: Reject mutable search_path in SQL functions
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Run Supabase database linter
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -o pipefail
          supabase db lint --linked --level warning --schema public 2>&1 | tee lint-output.txt

      - name: Fail on mutable / unset search_path findings
        run: |
          if grep -E -i "function_search_path_mutable|search_path.*(mutable|not set|unset)" lint-output.txt; then
            echo "::error::SQL function(s) have a mutable or unset search_path. Add 'SET search_path = public' to the function definition and ship a migration."
            exit 1
          fi
          echo "No mutable/unset search_path findings."
